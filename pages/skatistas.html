<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkateHub-Skatistas</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/skatistas.css">
</head>
<body>
    <header>
        <h1>Skate<span style="color: #9B111E">Hub</span></h1>

        <nav>
            <a href="../index.html">Home</a>
            <a href="../pages/skatistas.html" class="ativo">Skatistas</a>
            <a href="../pages/skateparks.html">Skateparks</a>
            <a href="../pages/manobras.html">Manobras</a>
            <a href="../pages/sobre.html">Sobre</a>
        </nav>
        <button id="btn-tema" onclick="mudaTema()">☀️</button>
    </header>

    <main>
        <section>
            <h2>Principais skatistas</h2>
            <div id="filtros">
                <input type="text" id="pesquisa" placeholder="Pesquisar skatistas">

                <select id="filtro-pais" onchange="setPais(this.value)">
                    <option value="Todos">Pais</option>
                    <option value="Austrália">Austrália</option>
                    <option value="Brasil">Brasil</option>
                    <option value="Estados Unidos">Estados Unidos</option>
                    <option value="Japão">Japão</option>
                    <option value="Portugal">Portugal</option>
                    <option value="Reino Unido">Reino Unido</option>
                </select>
            </div>
            <p id="contador"></p>
        </section>

        <section>
            <div id="lista-skatistas"></div>
        </section>
    </main>

    <div id="modal" onclick="fecharModal()">
        <div id="modal-conteudo" onclick="event.stopPropagation()">
            <button id="modal-fechar" onclick="fecharModal()">✕</button>
            <img id="modal-foto">
            <h2 id="modal-nome"></h2>
            <p id="modal-pais"></p>
            <p id="modal-modalidade"></p>
            <p id="modal-bio"></p>
            <p id="modal-conquistas"></p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 - SkateHub</p>
    </footer>
    <script src="../js/dados.js"></script>
    <script src="../js/skatistas.js"></script>
    <script src="../js/tema.js"></script>
</body>
</html>
